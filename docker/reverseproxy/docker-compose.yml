# Composition for the reverse proxy that combines test and prod and handles TLS.
services:
  reverse-proxy:
    container_name: reverse-proxy
    image: nginxinc/nginx-unprivileged:alpine
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./conf.d:/etc/nginx/conf.d
      - ${CERTIFICATES_PATH}:/etc/letsencrypt
    networks:
      - production_nginx_network
      - testing_nginx_network
      - reverse_proxy_network
    depends_on:
      - acme-sh
      - umami
    restart: unless-stopped

  acme-sh:
    image: neilpang/acme.sh
    container_name: acme-sh
    command: daemon
    volumes:
      - ${CERTIFICATES_PATH}:/acme.sh
    networks:
      - reverse_proxy_network
    restart: unless-stopped

  umami:
    container_name: umami-${ENVIRONMENT_NAME}
    image: ghcr.io/umami-software/umami:3.0.3
    ports:
      - "3000:3000"
    environment:
      APP_SECRET: replace-me-with-a-random-string
      DATABASE_URL: postgresql://umami:umami@umami-db:5432/umami
    depends_on:
      umami-db:
        condition: service_healthy
    init: true
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "curl http://localhost:3000/api/heartbeat" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nginx_network

  umami-db:
    container_name: umami-db-${ENVIRONMENT_NAME}
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nginx_network

networks:
  production_nginx_network:
    name: production_nginx_network
    driver: bridge
    external: true
  testing_nginx_network:
    name: testing_nginx_network
    driver: bridge
    external: true
  reverse_proxy_network:
    name: reverse_proxy_network
    driver: bridge

volumes:
  umami-db-data:
